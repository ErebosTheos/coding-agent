<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
</head>
<body>
  <main>
    <h1>Calculator</h1>

    <section>
      <label for="first-number">First Number</label>
      <input id="first-number" type="number" />
    </section>

    <section>
      <label for="second-number">Second Number</label>
      <input id="second-number" type="number" />
    </section>

    <section id="operations">
      <button id="add-btn" type="button">+</button>
      <button id="subtract-btn" type="button">-</button>
      <button id="multiply-btn" type="button">*</button>
      <button id="divide-btn" type="button">/</button>
    </section>

    <section>
      <h2>Result</h2>
      <output id="result">0</output>
    </section>
  </main>
</body>
</html>
