<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter App</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f6f8;
      color: #1f2933;
    }

    .container {
      text-align: center;
      padding: 2rem;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      min-width: 260px;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.5rem;
    }

    .counter-display {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Simple Counter</h1>
    <div class="counter-display">Count: <span id="counter">0</span></div>
    <button id="increment-btn" type="button">Increment</button>
  </main>

  <script>
    const counterElement = document.getElementById("counter");
    const incrementButton = document.getElementById("increment-btn");

    incrementButton.addEventListener("click", () => {
      const currentValue = Number(counterElement.textContent) || 0;
      counterElement.textContent = String(currentValue + 1);
    });
  </script>
</body>
</html>
